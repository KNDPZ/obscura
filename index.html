<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Obscura">
    <title>Obscura – Watch Anything</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: #0a0a0a; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background-image 1.2s ease-in-out;
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.3);
            transform: scale(1.05);
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .media-card { transition: transform 0.2s ease, box-shadow 0.2s; }
        .media-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.5); }
        .modal-backdrop { backdrop-filter: blur(8px); background-color: rgba(0,0,0,0.85); z-index: 100; }
        .player-modal { z-index: 200; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e1e2a; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
        .loader { border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top: 3px solid #e50914; width: 40px; height: 40px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Skeleton shimmer loading placeholders */
        .skeleton {
            position: relative;
            overflow: hidden;
            background: #1a1a26;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06) 40%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.06) 60%, transparent);
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .skeleton-card { border-radius: 0.75rem; overflow: hidden; background: #14141f; }
        .skeleton-poster { width: 100%; aspect-ratio: 2 / 3; }
        .skeleton-line { height: 0.7rem; border-radius: 4px; margin: 0.55rem 0.7rem; }
        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }
        .media-card:hover .card-overlay { opacity: 1; }
        .media-card:hover img { filter: blur(2px); transform: scale(1.02); }
        .hover-popup {
            position: fixed;
            z-index: 10000;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(16px);
            color: white;
            border-radius: 1rem;
            padding: 1rem;
            max-width: 320px;
            font-size: 0.85rem;
            line-height: 1.5;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            transition: opacity 0.12s ease;
        }
        .carousel-btn { background: rgba(0,0,0,0.6); transition: all 0.2s; }
        .carousel-btn:hover { background: #e50914; }
        .carousel-dot { transition: all 0.2s; }
        .title-btn {
            background: linear-gradient(135deg, #e50914 0%, #b00710 100%);
            padding: 8px 20px;
            border-radius: 40px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .title-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(229,9,20,0.4); }
        .tooltip { position: relative; display: inline-block; }
        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            bottom: 125%;
            left: 50%;
            margin-left: -40px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
        .season-badge-active {
            background: #e50914 !important;
            color: white;
            box-shadow: 0 0 10px rgba(229,9,20,0.5);
        }
        .episode-card, .cast-card {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .episode-card:hover, .cast-card:hover {
            background: rgba(229,9,20,0.15);
            border-left-color: #e50914;
            transform: translateX(4px);
        }
        iframe { border: none; background: #000; }
        .episode-thumb {
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #1a1a2e;
        }
        .cast-avatar {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #e50914;
        }
        .recommendation-card, .filmography-item, .person-card, .company-card, .provider-card, .island-card {
            transition: transform 0.2s;
            cursor: pointer;
        }
        .recommendation-card:hover, .filmography-item:hover, .person-card:hover, .company-card:hover, .provider-card:hover, .island-card:hover {
            transform: scale(1.02);
        }
        .active-tab {
            background: #e50914;
            color: white;
            border-radius: 40px;
        }
        .tab-btn {
            transition: all 0.2s;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 40px;
        }
        .tab-btn:hover {
            background: rgba(229,9,20,0.2);
        }
        .upcoming-teaser {
            background: linear-gradient(135deg, #1e1e2a 0%, #0a0a0a 100%);
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1.5rem;
            width: 100%;
        }
        .keyword-chip {
            background-color: #2e7d32;
            transition: transform 0.1s ease;
        }
        .keyword-chip:hover {
            transform: scale(1.05);
            background-color: #1b5e20;
        }
        .person-card, .company-card {
            background: #1e1e2a;
            border-radius: 1rem;
            overflow: hidden;
        }
        .role-tab {
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 30px;
            background: #2d2d3a;
            transition: all 0.2s;
        }
        .role-tab.active {
            background: #e50914;
            color: white;
        }
        .role-tab:hover:not(.active) {
            background: #3d3d4a;
        }
        .avatar-card {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .avatar-card:hover {
            transform: translateY(-2px);
        }
        .avatar-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 2px solid #e50914;
            margin: 0 auto;
        }
        @media (min-width: 640px) {
            .avatar-img { width: 80px; height: 80px; }
        }
        .avatar-card p {
            margin-top: 8px;
            font-size: 0.75rem;
            line-height: 1.2;
        }
        .company-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            padding: 4px;
        }
        .rating-badge {
            display: inline-block;
            background-color: #2e2e3a;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
            vertical-align: middle;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .rating-G, .rating-TV-Y, .rating-TV-Y7, .rating-Approved { background-color: #2e7d32; color: white; }
        .rating-PG, .rating-TV-PG, .rating-TV-G { background-color: #f9a825; color: black; }
        .rating-PG-13, .rating-13, .rating-TV-14 { background-color: #ef6c00; color: white; }
        .rating-R, .rating-TV-MA, .rating-NC-17, .rating-18 { background-color: #c62828; color: white; }
        .rating-unrated { background-color: #6c757d; color: white; }
        
        /* Provider glossy buttons (compact row) */
        .provider-card {
            background: linear-gradient(135deg, #2a2a35 0%, #1e1e2a 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        .provider-card:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3a3a48 0%, #2a2a38 100%);
            border-color: rgba(229,9,20,0.5);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }
        .provider-card img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        
        /* Island card - 2 columns, 3 rows */
        .island-card {
            background: linear-gradient(145deg, #1e1e2e, #12121a);
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .island-card:hover .island-overlay {
            opacity: 1;
        }
        .island-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
            pointer-events: none;
        }
        .island-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        .carousel-container {
            overflow: hidden;
            width: 100%;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-item {
            flex-shrink: 0;
            width: 100%;
            padding: 8px;
        }
        .carousel-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }
        .island-card .p-3 {
            padding: 8px;
            font-size: 0.8rem;
        }
        
        /* Drawer */
        .drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background: #0f0f1a;
            z-index: 200;
            transition: left 0.3s ease;
            box-shadow: 2px 0 20px rgba(0,0,0,0.5);
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        .drawer.open {
            left: 0;
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-content {
            padding: 1rem;
        }
        .filter-group {
            margin-bottom: 1rem;
        }
        .filter-label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 0.25rem;
        }
        .hamburger {
            cursor: pointer;
            font-size: 1.5rem;
            margin-right: 1rem;
            color: white;
        }
        .islands-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            width: 100%;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
        }
        /* Upcoming releases - horizontal scroll row (5 cards side by side) */
        .upcoming-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .upcoming-row .upcoming-card {
            flex: 0 0 auto;
            width: calc(20% - 0.8rem);
            min-width: 150px;
        }
        @media (max-width: 768px) {
            .upcoming-row .upcoming-card { width: calc(33.33% - 0.8rem); }
        }
        @media (max-width: 480px) {
            .upcoming-row .upcoming-card { width: calc(50% - 0.8rem); }
        }
        .upcoming-card {
            background: #1e1e2a;
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .upcoming-card:hover {
            transform: scale(1.02);
        }
        .upcoming-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }
        .upcoming-card .p-2 {
            padding: 0.5rem;
        }
        .provider-buttons-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin: 1rem 0;
        }
        @media (min-width: 640px) {
            .provider-buttons-row { gap: 1rem; }
        }
        /* Pagination spacing */
        .pagination-container {
            margin-top: 3rem;
        }
        .player-server-btn {
            font-size: 0.72rem; font-weight: 600; padding: 4px 14px; border-radius: 9999px;
            background: #1f2430; color: #cbd5e1; border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .player-server-btn:hover { background: #2b3242; }
        .player-server-btn.active { background: #e50914; color: #fff; border-color: #e50914; }

        /* ============================================================
           MOBILE & TOUCH OPTIMIZATIONS (for app conversion)
           ============================================================ */
        * { -webkit-tap-highlight-color: transparent; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body { -webkit-overflow-scrolling: touch; overscroll-behavior-y: none; }
        button, .tab-btn, .provider-card, .media-card, .bottom-nav-btn { -webkit-user-select: none; user-select: none; }

        /* Honor iOS notch / home-indicator safe areas */
        header { padding-top: max(1rem, env(safe-area-inset-top)); }
        .carousel-hero { min-height: 480px; }

        /* Native-style bottom navigation (mobile only) */
        .bottom-nav {
            position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
            display: none;
            background: rgba(10,10,16,0.97);
            backdrop-filter: blur(14px);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; padding: 9px 0 7px; color: #8b8b9a; font-size: 0.62rem; font-weight: 600;
            background: none; border: none; cursor: pointer; transition: color 0.15s;
            min-height: 52px;
        }
        .bottom-nav-btn i { font-size: 1.15rem; }
        .bottom-nav-btn:active { transform: scale(0.92); }
        .bottom-nav-btn.active { color: #e50914; }

        @media (max-width: 768px) {
            /* Prevent iOS auto-zoom when focusing form fields */
            input, select, textarea { font-size: 16px !important; }
            /* Show bottom nav, hide the in-header tab row it replaces */
            .bottom-nav { display: flex; }
            .top-tabs { display: none !important; }
            .header-badge { display: none; }
            /* Keep content clear of the fixed bottom nav */
            main { padding-bottom: calc(76px + env(safe-area-inset-bottom)) !important; }
            footer { padding-bottom: calc(76px + env(safe-area-inset-bottom)); }
            /* Smaller, lighter hero on phones */
            .carousel-hero { min-height: 340px; }
            /* Bigger finger targets */
            .carousel-btn { width: 2.75rem; height: 2.75rem; }
            .page-num-btn, #prevPageBtn, #nextPageBtn, #firstPageBtn, #lastPageBtn { min-height: 42px; min-width: 42px; }
            .role-tab { min-height: 38px; }
        }

        /* Touch devices have no hover: the card action overlay must stay reachable.
           Show a subtle gradient with the actions docked bottom-right, and don't blur the poster. */
        @media (hover: none) {
            .card-overlay {
                opacity: 1;
                background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.15) 45%, transparent 70%);
                backdrop-filter: none;
                align-items: flex-end;
                justify-content: flex-end;
                gap: 0.4rem;
                padding: 0.5rem;
            }
            .media-card:hover img { filter: none; transform: none; }
            .card-overlay button { width: 2.4rem; height: 2.4rem; }
        }
    </style>
</head>
<body>
    <div id="bgLayer" class="bg-layer" style="background-image: url('');"></div>
    <div id="app" class="min-h-screen flex flex-col relative z-10"></div>

    <script>
        // ========================
        //  API CONFIGURATION
        // ========================
        const TMDB_BASE = 'https://api.themoviedb.org/3';
        const TMDB_IMG = 'https://image.tmdb.org/t/p/w500';
        const TMDB_BACKDROP = 'https://image.tmdb.org/t/p/original';
        const TMDB_EPISODE_STILL = 'https://image.tmdb.org/t/p/w500';
        const BEARER_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI1NmI0NDE2NTYxYmZjODVhMWM0ODExY2M2ZTY3YzBiZiIsIm5iZiI6MTc3MTUwNDY5OS44NzYsInN1YiI6IjY5OTcwNDNiNzg0NDIxYWUxOTRhOTc3OSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.i5lTNnOdscofKVD2vfoIvBUamn4IhvlAPvw6w60GP20';
        
        const PLAYER_BASE = 'https://vaplayer.ru';
        const PLAYER_BASE_FALLBACK = 'https://www.vidking.net';
        
        // Inline SVG placeholders — self-contained, instant, and never break like an
        // external placeholder service can. Used wherever a poster/backdrop is missing.
        function makePlaceholder(w, h, label) {
            const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}' viewBox='0 0 ${w} ${h}'>`
                + `<rect width='100%' height='100%' fill='#1a1a2e'/>`
                + `<text x='50%' y='50%' fill='#4b4b63' font-family='sans-serif' font-size='${Math.round(w/12)}' text-anchor='middle' dominant-baseline='middle'>${label}</text></svg>`;
            return `data:image/svg+xml,${encodeURIComponent(svg)}`;
        }
        const POSTER_PLACEHOLDER = makePlaceholder(300, 450, 'No Poster');
        const IMAGE_PLACEHOLDER = makePlaceholder(300, 169, 'No Image');
        
        async function fetchTMDB(endpoint, params = {}) {
            const url = new URL(`${TMDB_BASE}${endpoint}`);
            Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
            const response = await fetch(url.toString(), {
                headers: { 'Authorization': `Bearer ${BEARER_TOKEN}`, 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`TMDB API error (${response.status})`);
            return response.json();
        }
        
        function removeAllHoverPopups() {
            document.querySelectorAll('.hover-popup').forEach(popup => popup.remove());
        }
        document.addEventListener('click', function() {
            removeAllHoverPopups();
        });
        
        // ========================
        //  APP STATE
        // ========================
        let currentTab = 'all';
        let selectedMovie = null;
        let selectedTVShow = null;
        let selectedTVShowSimilar = [];
        let currentCastInfo = null;
        let viewMode = 'movie';
        let contentList = [];
        let peopleList = [];
        let companyList = [];
        let totalPages = 1;
        let currentPageNum = 1;
        let searchQuery = '';
        let isLoading = false;
        let carouselInterval = null;
        let currentCarouselIndex = 0;
        let bgInterval = null;
        let genreId = '';
        let year = '';
        let rating = '';
        let primarySort = 'release_date.desc';
        let dateOrder = 'release_date.desc';
        let activeMode = 'trending';
        let mediaType = 'all';
        let upcomingType = 'all';
        let upcomingOrder = 'nearest';
        let companyFilter = null;
        let selectedProviderId = null;
        let watchProviders = [];
        let showProviderButtons = true;
        let isDrawerOpen = false;
        
        // Island data
        let providerIslands = {};
        // Order for 2-column, 3-row grid (row-major fill): Netflix (8), HBO Max (1899), Paramount+ (531), Disney+ (337), Apple TV (350), Prime (119)
        const TARGET_PROVIDER_IDS = [8, 1899, 531, 337, 350, 119];
        const TARGET_PROVIDER_NAMES = {
            8: 'Netflix',
            1899: 'HBO Max',
            531: 'Paramount+',
            337: 'Disney+',
            350: 'Apple TV',
            119: 'Prime'
        };
        
        let genresList = [];
        let episodesCache = {};
        let activeSeason = null;
        
        const appContainer = document.getElementById('app');
        const bgLayer = document.getElementById('bgLayer');
        
        function setBackgroundImage(url) {
            if (url) bgLayer.style.backgroundImage = `url(${url})`;
            else bgLayer.style.backgroundImage = 'none';
        }
        
        function startBackgroundRotation() {
            if (bgInterval) clearInterval(bgInterval);
            if (!contentList.length) return;
            const updateBg = () => {
                const itemsForBg = contentList.slice(0, 20);
                if (itemsForBg.length) {
                    const randomIdx = Math.floor(Math.random() * itemsForBg.length);
                    const item = itemsForBg[randomIdx];
                    const bgUrl = item.backdrop_path ? TMDB_BACKDROP + item.backdrop_path : (item.poster_path ? TMDB_IMG + item.poster_path : '');
                    if (bgUrl) setBackgroundImage(bgUrl);
                }
            };
            updateBg();
            bgInterval = setInterval(updateBg, 10000);
        }
        
        function stopBackgroundRotation() {
            if (bgInterval) clearInterval(bgInterval);
        }
        
        function formatReleaseDateWithIcon(item, type) {
            let dateStr = type === 'movie' ? item.release_date : item.first_air_date;
            if (!dateStr) return 'N/A';
            let formatted = '';
            if (type === 'movie') {
                const date = new Date(dateStr);
                const year = date.getFullYear();
                const month = date.toLocaleString('default', { month: 'long' });
                formatted = `${year} ${month}`;
            } else {
                const lastAirDate = item.last_air_date;
                const status = item.status;
                if (status === 'Returning Series' || status === 'In Production') {
                    const startYear = new Date(dateStr).getFullYear();
                    formatted = `${startYear} - ongoing`;
                } else if (status === 'Ended' && lastAirDate) {
                    const endDate = new Date(lastAirDate);
                    const endYear = endDate.getFullYear();
                    const endMonth = endDate.toLocaleString('default', { month: 'long' });
                    const startYear = new Date(dateStr).getFullYear();
                    if (startYear === endYear) {
                        formatted = `${endYear} ${endMonth} (ended)`;
                    } else {
                        formatted = `${startYear} - ${endYear} ${endMonth}`;
                    }
                } else {
                    const date = new Date(dateStr);
                    const year = date.getFullYear();
                    const month = date.toLocaleString('default', { month: 'long' });
                    formatted = `${year} ${month}`;
                }
            }
            const icon = type === 'movie' ? '<i class="fas fa-film mr-1"></i>' : '<i class="fas fa-tv mr-1"></i>';
            return `${icon} ${formatted}`;
        }

        function getRatingClass(rating) {
            if (!rating) return 'rating-unrated';
            const upper = rating.toUpperCase();
            if (upper === 'G' || upper === 'TV-Y' || upper === 'TV-Y7' || upper === 'APPROVED') return 'rating-G';
            if (upper === 'PG' || upper === 'TV-PG' || upper === 'TV-G') return 'rating-PG';
            if (upper === 'PG-13' || upper === '13' || upper === 'TV-14') return 'rating-PG-13';
            if (upper === 'R' || upper === 'TV-MA' || upper === 'NC-17' || upper === '18') return 'rating-R';

        function getPlayableSources(tmdbId, imdbId, seasonNum, episodeNum, isMovie = false) {
            const urls = [];
            const seasonPadded = String(seasonNum).padStart(2, '0');
            const episodePadded = String(episodeNum).padStart(2, '0');
            
            if (isMovie) {
                // Primary source (unchanged ordering — keeps current behavior intact)
                if (imdbId && imdbId.startsWith('tt')) {
                    urls.push(`${PLAYER_BASE}/embed/movie/${imdbId}`);
                }
                if (tmdbId) {
                    urls.push(`${PLAYER_BASE}/embed/movie/${tmdbId}`);
                }
                // Additional fallback provider (TMDB based)
                if (tmdbId) {
                    urls.push(`${PLAYER_BASE_FALLBACK}/embed/movie/${tmdbId}?color=e50914&autoPlay=true`);
                }
            } else {
                if (imdbId && imdbId.startsWith('tt')) {
                    urls.push(`${PLAYER_BASE}/embed/tv/${imdbId}/S${seasonPadded}E${episodePadded}`);
                    urls.push(`${PLAYER_BASE}/embed/tv/${imdbId}/${seasonNum}/${episodeNum}`);
                }
                if (tmdbId) {
                    urls.push(`${PLAYER_BASE}/embed/tv/${tmdbId}/${seasonNum}/${episodeNum}`);
                    urls.push(`${PLAYER_BASE}/embed/tv/${tmdbId}/S${seasonPadded}E${episodePadded}`);
                    // Additional fallback provider (TMDB based)
                    urls.push(`${PLAYER_BASE_FALLBACK}/embed/tv/${tmdbId}/${seasonNum}/${episodeNum}?color=e50914&autoPlay=true&nextEpisode=true&episodeSelector=true`);
                }
            }
            
            // De-duplicate while preserving order; guarantee at least one URL.
            const seen = new Set();
            const deduped = urls.filter(u => { if (seen.has(u)) return false; seen.add(u); return true; });
            return deduped.length ? deduped : [`${PLAYER_BASE}/embed/movie/${tmdbId}`];
        }
        
        async function openVidPlayerWithFallback(tmdbId, imdbId, seasonNum, episodeNum, episodeTitle, seriesTitle, isMovie = false) {
            const sources = getPlayableSources(tmdbId, imdbId, seasonNum, episodeNum, isMovie);
            const modalDiv = document.createElement('div');
            modalDiv.className = 'fixed inset-0 z-[200] flex items-center justify-center modal-backdrop player-modal';
            const displayTitle = isMovie ? seriesTitle : `${seriesTitle} - S${seasonNum}E${episodeNum}: ${episodeTitle || 'Episode'}`;
            const serverBar = sources.length > 1 ? `
                <div class="flex flex-wrap items-center gap-2 bg-black/80 px-3 py-2 border-t border-gray-800">
                    <span class="text-xs text-gray-400 mr-1"><i class="fas fa-server mr-1"></i>Trouble playing? Switch server:</span>
                    ${sources.map((u, i) => `<button class="player-server-btn ${i === 0 ? 'active' : ''}" data-src="${i}">Server ${i + 1}</button>`).join('')}
                </div>` : '';
            modalDiv.innerHTML = `
                <div class="relative w-full max-w-5xl mx-4 bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-700">
                    <div class="flex justify-between items-center bg-black/80 p-3 border-b border-gray-800">
                        <span class="text-white font-semibold truncate"><i class="fas fa-play-circle mr-2 text-red-500"></i>${escapeHtml(displayTitle)}</span>
                        <button id="closePlayerBtn" class="text-white bg-red-700 hover:bg-red-800 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="aspect-video w-full bg-black flex items-center justify-center" id="playerContainer">
                        <div class="loader"></div>
                        <span class="ml-3 text-gray-400">Loading stream...</span>
                    </div>
                    ${serverBar}
                </div>
            `;
            document.body.appendChild(modalDiv);
            const closeModal = () => { modalDiv.remove(); document.body.style.overflow = ''; };
            document.getElementById('closePlayerBtn').addEventListener('click', closeModal);
            modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) closeModal(); });
            document.body.style.overflow = 'hidden';

            const playerContainer = modalDiv.querySelector('#playerContainer');
            function loadSource(index) {
                if (!playerContainer || index < 0 || index >= sources.length) return;
                const url = sources[index];
                playerContainer.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.className = 'w-full h-full';
                iframe.allowFullscreen = true;
                iframe.allow = 'autoplay; encrypted-media; fullscreen';
                iframe.onerror = () => {
                    if (index + 1 < sources.length) {
                        loadSource(index + 1); // auto-advance to the next server on hard error
                    } else {
                        playerContainer.innerHTML = `<div class="text-center text-red-400 p-4"><i class="fas fa-exclamation-triangle text-3xl mb-2"></i><p>Failed to load video.</p><p class="text-xs text-gray-500 mt-2">Try another server below.</p></div>`;
                    }
                };
                playerContainer.appendChild(iframe);
                modalDiv.querySelectorAll('.player-server-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            }
            modalDiv.querySelectorAll('.player-server-btn').forEach(btn => {
                btn.addEventListener('click', () => loadSource(parseInt(btn.dataset.src)));
            });
            loadSource(0);
        }

                    allItems = (ongoingData.results || []).map(t => ({ ...t, type: 'tv', release_date: t.first_air_date, media_type: 'tv' }));
                } else {
                    const needMovies = (upcomingType === 'all' || upcomingType === 'movie');
                    const needTV = (upcomingType === 'all' || upcomingType === 'tv');
                    const [movieData, tvData] = await Promise.all([
                        needMovies ? fetchUpcomingMovies(1) : Promise.resolve({ results: [] }),
                        needTV ? fetchUpcomingTV(1) : Promise.resolve({ results: [] })
                    ]);
                    if (needMovies) {
                        const movies = movieData.results || [];
                        allItems.push(...movies.map(m => ({ ...m, type: 'movie', release_date: m.release_date, media_type: 'movie' })));
                    }
                    if (needTV) {
                        const tvShows = tvData.results || [];
                        allItems.push(...tvShows.map(t => ({ ...t, type: 'tv', release_date: t.first_air_date, media_type: 'tv' })));
                    }
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    allItems = allItems.filter(item => item.release_date && new Date(item.release_date) >= today);
                    if (upcomingOrder === 'nearest') {
                        allItems.sort((a,b) => new Date(a.release_date) - new Date(b.release_date));
                    } else if (upcomingOrder === 'farthest') {
                        allItems.sort((a,b) => new Date(b.release_date) - new Date(a.release_date));
                    }
                }
                contentList = allItems;
                totalPages = 1;
                currentPageNum = 1;
                isLoading = false;
                renderUpcomingPage();
                startCarousel();
                startBackgroundRotation();
            } catch (err) {

                renderErrorState(err.message);

                        const tvData = await fetchDiscoverTV(page);
                        combinedResults = (tvData.results || []).map(t => ({ ...t, media_type: 'tv' }));
                        totalResultsPages = tvData.total_pages || 1;
                    }
                }
                
                combinedResults.sort((a, b) => {
                    const dateA = a.release_date || a.first_air_date;
                    const dateB = b.release_date || b.first_air_date;
                    if (!dateA && !dateB) return 0;
                    if (!dateA) return 1;
                    if (!dateB) return -1;
                    return new Date(dateB) - new Date(dateA);
                });
                
                if (randomMode) {
                    for (let i = combinedResults.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [combinedResults[i], combinedResults[j]] = [combinedResults[j], combinedResults[i]];
                    }
                }
                contentList = combinedResults;
                peopleList = peopleResults;
                companyList = companyResults;
                totalPages = totalResultsPages;
                currentPageNum = page;
                isLoading = false;
                renderHomePage();
                startCarousel();
                startBackgroundRotation();
            } catch (err) {
                isLoading = false;
                renderErrorState(err.message);
            }
        }

        function render() {

                mediaType = 'all';
                loadAllContent(1);
            } else if (currentTab === 'movies') {
                mediaType = 'movie';
                loadAllContent(1);
            } else if (currentTab === 'tv') {
                mediaType = 'tv';
                loadAllContent(1);
            } else if (currentTab === 'upcoming') loadUpcomingContent();
            else if (currentTab === 'detail') {
                if (viewMode === 'movie' && selectedMovie) renderMovieModal();
                else if (viewMode === 'tvshow' && selectedTVShow) renderTVSeriesModalWithCastAndEpisodes();
                else if (viewMode === 'cast' && currentCastInfo) renderCastModal();
                else { currentTab = 'all'; render(); }
            } else {
                currentTab = 'all';
                loadAllContent(1);
            }
        }

            function positionPopup(mouseX, mouseY) { if (!popupElement) return; const rect = popupElement.getBoundingClientRect(); let left = mouseX + 15, top = mouseY + 15; if (left + rect.width > window.innerWidth - 10) left = mouseX - rect.width - 15; if (left < 10) left = mouseX + 15; if (top + rect.height > window.innerHeight - 10) top = mouseY - rect.height - 15; if (top < 10) top = mouseY + 15; popupElement.style.left = left+'px'; popupElement.style.top = top+'px'; }

        function nextCarouselSlide() { 
            const items = getCarouselItems(); 
            if (!items.length) return; 
            currentCarouselIndex = (currentCarouselIndex + 1) % items.length; 
            updateCarouselUI(); 
            const item = items[currentCarouselIndex]; 
            if (item) { 
                const bgUrl = item.backdrop_path ? TMDB_BACKDROP + item.backdrop_path : (item.poster_path ? TMDB_IMG + item.poster_path : ''); 
                if (bgUrl) setBackgroundImage(bgUrl); 
            } 
        }
        
        function prevCarouselSlide() { 
            const items = getCarouselItems(); 
            if (!items.length) return; 
            currentCarouselIndex = (currentCarouselIndex - 1 + items.length) % items.length; 
            updateCarouselUI(); 
            const item = items[currentCarouselIndex]; 
            if (item) { 
                const bgUrl = item.backdrop_path ? TMDB_BACKDROP + item.backdrop_path : (item.poster_path ? TMDB_IMG + item.poster_path : ''); 
                if (bgUrl) setBackgroundImage(bgUrl); 
            } 
        }
        
        function startCarousel() { 
            if (carouselInterval) clearInterval(carouselInterval);

        }

                    </div>
                `;
            }
            
            function renderPeopleGrid(department) {
                if (department === 'Companies') {
                    return renderCompaniesGrid();
                } else if (department === 'Cast') {
                    if (!cast.length) return '<div class="text-gray-400 text-center py-8">No cast information available.</div>';
                    return `
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                            ${cast.map(actor => `
                                <div class="avatar-card cast-member" data-id="${actor.id}" data-name="${escapeHtml(actor.name)}">
                                    <div class="avatar-img" style="background-image: url('${actor.profile_path ? TMDB_IMG + actor.profile_path : IMAGE_PLACEHOLDER}');"></div>
                                    <p class="font-semibold text-xs truncate">${escapeHtml(actor.name)}</p>
                                    <p class="text-gray-400 text-xs truncate">${escapeHtml(actor.character)}</p>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else {
                    const deptPeople = departments[department] || [];
                    if (!deptPeople.length) return '<div class="text-gray-400 text-center py-8">No crew information for this department.</div>';
                    return `
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                            ${deptPeople.map(person => `
                                <div class="avatar-card crew-member" data-id="${person.id}" data-name="${escapeHtml(person.name)}">
                                    <div class="avatar-img" style="background-image: url('${person.profile_path ? TMDB_IMG + person.profile_path : IMAGE_PLACEHOLDER}');"></div>
                                    <p class="font-semibold text-xs truncate">${escapeHtml(person.name)}</p>
                                    <p class="text-gray-400 text-xs truncate">${escapeHtml(person.job)}</p>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            }
            
            const tabsHtml = `
                <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-700 pb-2">
                    ${departmentNames.map(dept => `
                        <button class="role-tab ${dept === 'Companies' ? 'active' : ''}" data-department="${dept}">${dept}</button>
                    `).join('')}
                </div>
                <div id="peopleGridContainer" class="min-h-[200px]">
                    ${renderPeopleGrid('Companies')}
                </div>
            `;
            
            const collectionButtonHtml = collection ? `<button id="collectionBtn" class="bg-purple-700 hover:bg-purple-800 px-4 py-2 rounded-full text-sm flex items-center gap-2"><i class="fas fa-layer-group"></i> Collection</button>` : '';
            
            const html = `<div class="fixed inset-0 z-50 overflow-y-auto modal-backdrop" id="detailModal"><div class="min-h-screen px-4 py-8 flex items-center justify-center"><div class="relative bg-gradient-to-b from-gray-900 to-black rounded-2xl max-w-7xl w-full shadow-2xl border border-gray-700 overflow-hidden max-h-[90vh] overflow-y-auto"><button id="closeDetailBtn" class="sticky top-4 right-4 float-right z-20 bg-black/60 hover:bg-red-700 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-times text-xl"></i></button><div class="clearfix"></div><div class="md:flex px-6 pt-6 pb-4 border-b border-gray-800"><div class="md:w-1/4 p-2 flex justify-center"><img loading="lazy" decoding="async" src="${posterUrl}" class="rounded-xl shadow-2xl max-h-72 object-cover"></div><div class="md:w-3/4 p-4"><h1 class="text-3xl font-bold">${escapeHtml(title)} ${ratingBadgeHtml} <span class="text-gray-400 text-2xl">(${year})</span></h1><div class="flex flex-wrap gap-2 mt-2"><span class="bg-yellow-600/20 text-yellow-400 px-3 py-1 rounded-full text-sm"><i class="fas fa-star mr-1"></i> ${rating}/10</span></div><div class="flex flex-wrap gap-2 mt-3">${genres.map(g => `<span class="genre-chip bg-red-900/80 hover:bg-red-700 px-3 py-1 rounded-full text-xs cursor-pointer transition" data-genre-id="${g.id}" data-genre-name="${escapeHtml(g.name)}">${escapeHtml(g.name)}</span>`).join('')}${keywords.map(kw => `<span class="keyword-chip bg-green-800/80 hover:bg-green-600 px-3 py-1 rounded-full text-xs cursor-pointer transition" data-keyword="${escapeHtml(kw.name)}">${escapeHtml(kw.name)}</span>`).join('')}</div><div class="mt-3"><p class="text-gray-300 text-sm">${escapeHtml(plot)}</p></div><div class="mt-4 flex flex-wrap gap-3">${trailerKey ? `<button id="trailerModalBtn" class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded-full text-sm"><i class="fab fa-youtube"></i> Trailer</button>` : ''}<button id="closeModalBackBtn" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-full text-sm"><i class="fas fa-arrow-left"></i> Back</button></div></div></div>
            
            <div class="px-6 pt-4">${tabsHtml}</div>
            
            <div class="px-6 pt-2"><div class="flex flex-wrap justify-between items-center"><h3 class="text-xl font-bold mb-3"><i class="fas fa-calendar-alt mr-2 text-red-500"></i> Seasons</h3>${collectionButtonHtml}</div><div class="flex flex-wrap gap-2 mb-6" id="seasonsContainer">${seasons.filter(s => s.season_number > 0).map(s => `<button class="season-tab px-4 py-2 rounded-full text-sm font-medium transition ${activeSeason === s.season_number ? 'season-badge-active bg-red-700' : 'bg-gray-800 hover:bg-gray-700'}" data-season="${s.season_number}">Season ${s.season_number} (${s.episode_count || 0} eps)</button>`).join('')}${seasons.filter(s => s.season_number === 0).map(s => `<button class="season-tab px-4 py-2 rounded-full text-sm bg-gray-800 hover:bg-gray-700" data-season="0">Specials (${s.episode_count || 0})</button>`).join('')}</div></div>
            <div class="px-6 pb-8"><div class="flex items-center justify-between mb-4"><h3 class="text-xl font-bold"><i class="fas fa-tv mr-2 text-green-500"></i> Episodes - Season ${activeSeason}</h3>${episodes.length === 0 ? '<span class="text-xs text-gray-400">Loading episodes...</span>' : ''}</div><div id="episodesList" class="space-y-4 max-h-[50vh] overflow-y-auto pr-2">${episodes.length === 0 ? `<div class="flex justify-center py-8"><div class="loader"></div><span class="ml-3">Fetching episodes...</span></div>` : episodes.map(ep => `<div class="episode-card bg-gray-800/70 rounded-xl overflow-hidden cursor-pointer transition-all flex flex-col md:flex-row gap-4 p-3 hover:shadow-lg" data-season="${activeSeason}" data-episode-num="${ep.episode_number}" data-episode-title="${escapeHtml(ep.name)}"><div class="md:w-64 flex-shrink-0"><img loading="lazy" decoding="async" src="${ep.still_path ? TMDB_EPISODE_STILL + ep.still_path : IMAGE_PLACEHOLDER}" class="episode-thumb w-full rounded-lg shadow-md"></div><div class="flex-1 flex flex-col justify-between"><div><div class="flex items-center gap-2 flex-wrap"><span class="bg-red-800/60 text-white text-xs font-bold px-2 py-1 rounded">S${activeSeason}E${ep.episode_number}</span><h4 class="text-lg font-semibold text-white">${escapeHtml(ep.name)}</h4><span class="text-gray-400 text-xs">${ep.air_date || 'TBA'}</span></div><p class="text-gray-300 text-sm mt-2 line-clamp-3">${escapeHtml(ep.overview || 'No overview available.')}</p></div><div class="mt-3"><button class="play-episode-btn bg-green-700 hover:bg-green-800 px-4 py-1.5 rounded-full text-sm font-medium flex items-center gap-2 w-fit"><i class="fas fa-play"></i> Play Episode</button></div></div></div>`).join('')}</div>${episodes.length === 0 && episodes.length !== undefined ? `<div class="text-center py-8 text-gray-400"><i class="fas fa-info-circle"></i> No episodes available for this season.</div>` : ''}</div>
            
            <div class="px-6 pb-8 border-t border-gray-800 pt-6"><h3 class="text-xl font-bold mb-4">✨ More like ${escapeHtml(title)}</h3><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="recommendationsGrid">${selectedTVShowSimilar.slice(0, 10).map(s => `<div class="recommendation-card bg-gray-800 rounded-xl overflow-hidden cursor-pointer transition hover:scale-105" data-id="${s.id}" data-title="${escapeHtml(s.name)}" data-plot="${escapeHtml(s.overview || 'No plot available.')}" data-year="${s.first_air_date?.split('-')[0] || 'N/A'}" data-rating="${s.vote_average?.toFixed(1) || 'N/A'}"><img loading="lazy" decoding="async" src="${s.poster_path ? TMDB_IMG + s.poster_path : POSTER_PLACEHOLDER}" class="w-full h-40 object-cover"><div class="p-2"><h4 class="font-bold text-sm truncate">${escapeHtml(s.name)}</h4><div class="text-xs text-gray-400">${s.first_air_date?.split('-')[0] || 'N/A'}</div></div></div>`).join('')}</div></div>
            </div></div></div>`;
            appContainer.innerHTML = html;
            
            const closeModal = () => { currentTab = 'all'; startBackgroundRotation(); render(); };
            document.getElementById('closeDetailBtn')?.addEventListener('click', closeModal);
            document.getElementById('closeModalBackBtn')?.addEventListener('click', closeModal);
            document.getElementById('detailModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('detailModal')) closeModal(); });
            document.getElementById('collectionBtn')?.addEventListener('click', async () => {
                if (collection && collection.id) {
                    const collectionData = await fetchCollectionDetails(collection.id);
                    const parts = collectionData.parts || [];
                    const collectionItems = parts.map(p => ({ ...p, media_type: 'movie' }));
                    contentList = collectionItems;
                    totalPages = 1;
                    currentPageNum = 1;
                    currentTab = 'all';
                    mediaType = 'all';
                    renderHomePage();
                }
            });
            
            const roleTabs = document.querySelectorAll('.role-tab');
            roleTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    roleTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const dept = tab.dataset.department;
                    const container = document.getElementById('peopleGridContainer');
                    if (container) {
                        container.innerHTML = renderPeopleGrid(dept);
                        attachCastCrewClickEvents();
                        attachCompanyClickEvents();
                    }
                });
            });
            
            function attachCastCrewClickEvents() {
                document.querySelectorAll('.cast-member, .crew-member').forEach(el => {
                    el.removeEventListener('click', personClickHandler);
                    el.addEventListener('click', personClickHandler);
                });
            }
            async function personClickHandler(e) {
                const personId = parseInt(this.dataset.id);
                const personName = this.dataset.name;
                if (!personId) return;
                removeAllHoverPopups();
                showFullCastModal(personId, personName);
            }
            function attachCompanyClickEvents() {
                document.querySelectorAll('.company-card').forEach(el => {
                    el.removeEventListener('click', companyClickHandler);
                    el.addEventListener('click', companyClickHandler);
                });
            }
            async function companyClickHandler(e) {
                const companyName = this.dataset.companyName;
                if (!companyName) return;
                // Close the detail modal, then run a normal search using the company
                // name (identical to typing it into the search box and pressing Enter).
                // Routed through the top-level runSearchByName so the global year/rating
                // state is not shadowed by the const year/rating inside this modal.
                const modalEl = document.getElementById('detailModal');
                if (modalEl) modalEl.remove();
                runSearchByName(companyName);
            }
            attachCastCrewClickEvents();
            attachCompanyClickEvents();
            
            document.querySelectorAll('.genre-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const genreIdVal = chip.dataset.genreId;
                    if (genreIdVal) searchByTerm('', true, genreIdVal);
                });
            });
            document.querySelectorAll('.keyword-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const keyword = chip.dataset.keyword;
                    if (keyword) searchByTerm(keyword, false);
                });
            });
            document.querySelectorAll('.recommendation-card').forEach(card => {
                card.addEventListener('click', async () => {
                    const id = parseInt(card.dataset.id);
                    removeAllHoverPopups();
                    stopBackgroundRotation();
                    isLoading = true;
                    renderLoadingState();
                    try {
                        const [full, similar] = await Promise.all([fetchTVSeriesDetails(id), fetchSimilarTVShows(id)]);
                        selectedTVShow = full;
                        selectedTVShowSimilar = similar;
                        viewMode = 'tvshow';
                        currentCastInfo = null;
                        isLoading = false;
                        render();
                    } catch(err) { isLoading = false; alert('Error loading recommendation'); render(); }
                });
            });
            document.querySelectorAll('.season-tab').forEach(tab => {
                tab.addEventListener('click', async () => {
                    const seasonNum = parseInt(tab.dataset.season);
                    if (isNaN(seasonNum)) return;
                    activeSeason = seasonNum;
                    if (selectedTVShow) {
                        const full = await fetchTVSeriesDetails(selectedTVShow.id);
                        selectedTVShow = full;
                        renderTVSeriesModalWithCastAndEpisodes();
                    }
                });
            });
            document.querySelectorAll('.play-episode-btn').forEach(btn => {
                const parent = btn.closest('.episode-card');
                if (parent) {
                    const season = parseInt(parent.dataset.season);
                    const episodeNum = parseInt(parent.dataset.episodeNum);
                    const episodeTitle = parent.dataset.episodeTitle;
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        removeAllHoverPopups();
                        openVidPlayerWithFallback(tmdbId, imdbId, season, episodeNum, episodeTitle, title);
                    });
                }
            });
            if (trailerKey) document.getElementById('trailerModalBtn')?.addEventListener('click', () => openTrailerModal(trailerKey));
        }
        
        function openTrailerModal(key) {
            const modal = document.createElement('div'); modal.className = "fixed inset-0 z-50 flex items-center justify-center modal-backdrop"; modal.innerHTML = `<div class="w-full max-w-4xl mx-4 bg-black rounded-xl overflow-hidden"><div class="flex justify-end p-2"><button id="closeTrailerBtn" class="text-white text-3xl px-3">&times;</button></div><div class="aspect-video"><iframe class="w-full h-full" src="https://www.youtube.com/embed/${key}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div></div>`; document.body.appendChild(modal); document.getElementById('closeTrailerBtn').onclick = () => modal.remove(); modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
        }
        
        function renderLoadingState() {
            const card = `<div class="skeleton-card"><div class="skeleton skeleton-poster"></div><div class="skeleton skeleton-line" style="width:80%"></div><div class="skeleton skeleton-line" style="width:50%"></div></div>`;
            const skeletonGrid = Array.from({ length: 15 }).map(() => card).join('');
            appContainer.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-8 w-full">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="loader" style="width:28px;height:28px;border-width:3px;"></div>
                        <span class="text-gray-300 font-medium">Loading content…</span>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">${skeletonGrid}</div>
                </div>`;
        }
        function renderErrorState(msg) { appContainer.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen text-center px-4"><i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-4"></i><h2 class="text-2xl font-bold">Error</h2><p class="text-gray-400 mt-2">${msg}</p><button id="retryBtn" class="mt-6 bg-red-700 px-6 py-2 rounded-full">Retry</button></div>`; document.getElementById('retryBtn')?.addEventListener('click', () => window.location.reload()); }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        
        async function init() {
            renderLoadingState();
            try {
                [genresList, watchProviders] = await Promise.all([fetchGenres(), fetchWatchProviders()]);
                currentTab = 'all';
                mediaType = 'all';
                await loadAllContent(1);
            } catch(err) { renderErrorState(err.message); }
        }
        init();
    </script>
</body>
</html>
